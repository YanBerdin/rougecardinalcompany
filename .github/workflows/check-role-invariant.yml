# =============================================================================
# Check Role Invariant — GitHub Actions Workflow
#
# Audite la base Supabase (prod ou staging) pour vérifier qu'aucun utilisateur
# n'a un `auth.users.raw_app_meta_data->>'role'` hors whitelist
# (user, editor, admin). Fait partie du durcissement anti-privilege-escalation
# (TASK096, Phase 5, Step 16).
#
# Déclencheurs :
#   - Cron quotidien (07:00 UTC)
#   - workflow_dispatch (manuel)
#
# Secret requis :
#   - INVARIANT_DB_URL : chaîne `postgres://...` vers la base à auditer
#     (par ex. URL du pooler Supabase avec credentials lecture).
# =============================================================================

name: Check Role Invariant

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: check-role-invariant-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-invariant:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run role invariant check
        env:
          INVARIANT_DB_URL: ${{ secrets.INVARIANT_DB_URL }}
        run: pnpm exec tsx scripts/check-role-invariant.ts
