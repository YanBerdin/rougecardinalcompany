name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 10

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    # Customize this step as needed
    - name: Build application
      run: pnpm build
      env:
        # Skip T3 Env validation + provide dummy values so SDK constructors don't throw
        SKIP_ENV_VALIDATION: "1"
        NEXT_PUBLIC_SITE_URL: "https://placeholder.example.com"
        NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY: "placeholder_anon_key"
        SUPABASE_SECRET_KEY: "placeholder_secret_key"
        RESEND_API_KEY: "re_placeholder_key"
        EMAIL_FROM: "noreply@placeholder.example.com"
        EMAIL_CONTACT: "contact@placeholder.example.com"
